<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1133 768" role="img" aria-labelledby="title desc">
  <title id="title">MOH By Amiksha ecommerce preview</title>
  <desc id="desc">A soft editorial fashion landing page with Wear Your Story headline, navigation, and a model image silhouette.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f9f4ee" />
      <stop offset="100%" stop-color="#f4ebdf" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f2ddd1" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#f2ddd1" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="dress" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ccb7c4" />
      <stop offset="100%" stop-color="#ab95a9" />
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" />
    </filter>
  </defs>

  <rect width="1133" height="768" fill="url(#bg)" />
  <g opacity="0.45">
    <rect x="0" y="58" width="1133" height="2" fill="#eadfd6" />
    <rect x="143" y="0" width="2" height="768" fill="#eadfd6" />
    <rect x="1002" y="0" width="2" height="768" fill="#eadfd6" />
  </g>

  <g transform="translate(130 18)">
    <text x="0" y="34" fill="#5d3346" font-size="30" font-family="Georgia, serif" font-weight="700">MoH</text>
    <text x="0" y="49" fill="#a08f84" font-size="7" font-family="Arial, sans-serif" letter-spacing="2">BY AMIKSHA AND DESIGN</text>
  </g>

  <g font-family="Arial, sans-serif" font-size="16" fill="#8d7a70" transform="translate(550 32)">
    <rect x="0" y="-16" width="84" height="30" rx="15" fill="#e7b9b4" />
    <text x="42" y="4" text-anchor="middle" fill="#ffffff" font-weight="700">Home</text>
    <text x="112" y="4">Shop</text>
    <text x="192" y="4">Collections</text>
    <text x="313" y="4">Customize</text>
    <text x="430" y="4">About</text>
    <rect x="498" y="-18" width="98" height="36" rx="18" fill="#28c85b" />
    <text x="547" y="4" text-anchor="middle" fill="#ffffff" font-weight="700">WhatsApp</text>
  </g>

  <g transform="translate(280 210)">
    <rect x="0" y="-18" width="150" height="34" rx="17" fill="#f0d7d2" />
    <text x="75" y="3" text-anchor="middle" fill="#d49a97" font-size="14" font-family="Arial, sans-serif" letter-spacing="1.5">NEW COLLECTION 2025</text>

    <text x="-60" y="110" fill="#4f2d27" font-size="64" font-family="Georgia, serif" font-weight="700">Wear Your</text>
    <text x="8" y="178" fill="#cf8f94" font-size="64" font-family="Georgia, serif" font-style="italic" font-weight="700">Story</text>

    <g fill="#a38c7f" font-size="18" font-family="Georgia, serif">
      <text x="-105" y="250">Handcrafted women's fashion from the heart of India.</text>
      <text x="-104" y="284">Each piece is a canvas of femininity — made to order,</text>
      <text x="12" y="318">made for you.</text>
    </g>

    <rect x="-150" y="365" width="160" height="38" rx="19" fill="#56372e" />
    <text x="-70" y="389" text-anchor="middle" fill="#ffffff" font-size="16" font-family="Arial, sans-serif" font-weight="700">Explore Collection</text>
    <rect x="20" y="365" width="138" height="38" rx="19" fill="none" stroke="#e4b0ab" stroke-width="1.5" />
    <text x="89" y="389" text-anchor="middle" fill="#8d6a61" font-size="16" font-family="Arial, sans-serif">Customize Yours</text>

    <g transform="translate(-152 446)" font-family="Georgia, serif">
      <text x="0" y="0" fill="#55362e" font-size="20" font-weight="700">200+</text>
      <text x="0" y="20" fill="#b1988a" font-size="10">Happy Customers</text>
      <text x="88" y="0" fill="#55362e" font-size="20" font-weight="700">100%</text>
      <text x="88" y="20" fill="#b1988a" font-size="10">Handcrafted</text>
      <text x="174" y="0" fill="#55362e" font-size="20" font-weight="700">Made</text>
      <text x="178" y="20" fill="#b1988a" font-size="10">to Order</text>
    </g>
  </g>

  <g>
    <circle cx="759" cy="394" r="170" fill="url(#glow)" filter="url(#softBlur)" />
    <circle cx="971" cy="267" r="29" fill="#f3d9d2" opacity="0.9" />
    <circle cx="1016" cy="413" r="20" fill="#edbeb8" opacity="0.9" />
    <circle cx="588" cy="546" r="23" fill="#e3cb9f" opacity="0.9" />

    <ellipse cx="790" cy="420" rx="162" ry="213" fill="#eadfce" />

    <g opacity="0.28">
      <rect x="690" y="247" width="200" height="270" fill="#ffffff" />
      <rect x="708" y="265" width="28" height="36" fill="#e9c7b7" />
      <rect x="742" y="265" width="28" height="36" fill="#efe4d5" />
      <rect x="776" y="265" width="28" height="36" fill="#ecd3b7" />
      <rect x="810" y="265" width="28" height="36" fill="#f1e6d8" />
      <rect x="844" y="265" width="28" height="36" fill="#ebd5c0" />
      <rect x="708" y="307" width="28" height="36" fill="#f1e6d8" />
      <rect x="742" y="307" width="28" height="36" fill="#ebd5c0" />
      <rect x="776" y="307" width="28" height="36" fill="#e9c7b7" />
      <rect x="810" y="307" width="28" height="36" fill="#efe4d5" />
      <rect x="844" y="307" width="28" height="36" fill="#ecd3b7" />
    </g>

    <g transform="translate(714 235)">
      <path d="M92 18c18 0 31 15 31 34 0 20-14 34-31 34-19 0-32-14-32-34 0-20 13-34 32-34z" fill="#87645f" opacity="0.82" />
      <path d="M70 72c10-5 28-4 42 0 10 3 17 12 20 23l11 43c3 13 1 25-4 37l-17 37 9 87-30 4-17-73-16 72-29-4 8-86-16-39c-5-12-6-24-3-37l10-42c3-12 11-20 22-22z" fill="url(#dress)" opacity="0.95" />
      <path d="M123 98c10 9 17 22 20 39l8 33-22 10-11-34c-3-9-8-17-14-24z" fill="#b49eaf" opacity="0.7" />
      <path d="M69 97c-9 8-16 21-19 37l-9 35 21 9 9-34c3-9 8-17 14-23z" fill="#b9a7b8" opacity="0.58" />
      <path d="M45 214c31 17 78 18 113 0l12 62c-46 24-93 24-137 0z" fill="#b9a0b2" opacity="0.9" />
    </g>

    <g font-family="Georgia, serif" fill="#ffffff" text-anchor="middle">
      <text x="789" y="587" font-size="24" font-weight="700">MOH</text>
      <text x="789" y="607" font-size="11" letter-spacing="3">BY AMIKSHA</text>
    </g>

    <g transform="translate(756 648)">
      <circle cx="0" cy="0" r="4" fill="#f0d2cd" />
      <rect x="10" y="-4" width="16" height="8" rx="4" fill="#cb8d8f" />
      <circle cx="36" cy="0" r="4" fill="#f0d2cd" />
      <circle cx="50" cy="0" r="4" fill="#f0d2cd" />
      <circle cx="64" cy="0" r="4" fill="#f0d2cd" />
    </g>
